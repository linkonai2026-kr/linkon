<!doctype html>
<html lang="ko">
  <body style="margin:0;background:#f5f7fb;color:#111827;font-family:Arial,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f5f7fb;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border-radius:24px;box-shadow:0 20px 50px rgba(15,23,42,0.08);overflow:hidden;">
            <tr>
              <td style="padding:34px 32px 30px;">
                <div style="font-size:15px;font-weight:800;letter-spacing:.08em;color:#00a892;">LinkON</div>
                <h1 style="margin:18px 0 12px;font-size:28px;line-height:1.3;color:#111827;">안녕하세요, LinkON입니다.</h1>
                <p style="margin:0 0 16px;font-size:16px;line-height:1.7;color:#374151;">사용자님의 LinkON 통합 계정 이메일 인증을 위해 안내드립니다.</p>
                <p style="margin:0 0 24px;font-size:15px;line-height:1.7;color:#4b5563;"><strong style="color:#111827;">{{ .Email }}</strong> 주소로 가입을 요청하셨다면 아래 버튼을 눌러 인증을 완료해 주세요.</p>
                <p style="margin:0 0 24px;">
                  <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#00a892;color:#ffffff;text-decoration:none;font-weight:800;font-size:16px;padding:15px 22px;border-radius:999px;">이메일 인증 완료하기</a>
                </p>
                <p style="margin:0 0 10px;font-size:13px;line-height:1.7;color:#6b7280;">버튼이 열리지 않으면 아래 링크를 브라우저 주소창에 붙여 넣어 주세요.</p>
                <p style="margin:0 0 22px;font-size:12px;line-height:1.6;color:#6b7280;word-break:break-all;">{{ .ConfirmationURL }}</p>
                <div style="border-top:1px solid #e5e7eb;padding-top:18px;font-size:13px;line-height:1.7;color:#6b7280;">본인이 요청하지 않았다면 이 메일을 무시하셔도 됩니다. LinkON은 사용자의 일상 케어, 법률 이해, 세무 관리를 더 쉽게 시작할 수 있도록 돕는 AI 서비스 브랜드입니다.</div>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
