<!doctype html>
<html lang="ko">
  <body style="margin:0;background:#f5f7fb;color:#111827;font-family:Arial,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f5f7fb;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border-radius:24px;box-shadow:0 20px 50px rgba(15,23,42,0.08);overflow:hidden;">
            <tr>
              <td style="padding:34px 32px 30px;">
                <div style="font-size:15px;font-weight:800;letter-spacing:.08em;color:#00a892;">LinkON</div>
                <h1 style="margin:18px 0 12px;font-size:28px;line-height:1.3;color:#111827;">보안 확인 코드</h1>
                <p style="margin:0 0 16px;font-size:16px;line-height:1.7;color:#374151;">안녕하세요, LinkON입니다. 계정 보안을 위해 아래 인증 코드를 입력해 주세요.</p>
                <div style="margin:22px 0 24px;padding:18px 20px;border-radius:18px;background:#ecfdf5;color:#065f46;font-size:30px;font-weight:800;letter-spacing:.18em;text-align:center;">{{ .Token }}</div>
                <div style="border-top:1px solid #e5e7eb;padding-top:18px;font-size:13px;line-height:1.7;color:#6b7280;">본인이 요청하지 않았다면 이 코드를 입력하지 말고 계정 보안을 확인해 주세요.</div>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
